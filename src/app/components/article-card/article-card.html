<div class="ac-container">
  <div class="ac-left">
    <h3 class="ac-title">{{ title() }}</h3>
    <div class="ac-footer">
      <div class="ac-rating">
        <!-- Render 5 stars based on rating -->
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <svg width="20" height="20" viewBox="0 0 24 24" [attr.fill]="i <= rating() ? '#FFC107' : '#E0E0E0'" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          </svg>
        }
      </div>
      <button class="ac-bookmark-btn" aria-label="Bookmark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2A282F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
      </button>
    </div>
  </div>
  <div class="ac-right">
    <img [src]="imgSrc()" alt="Article image" class="ac-image" />
  </div>
</div>
